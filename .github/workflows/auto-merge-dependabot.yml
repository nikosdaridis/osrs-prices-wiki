name: Dependabot auto-merge

on:
  pull_request:
    types:
      - opened
      - labeled
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Debug metadata
        run: |
          echo "Dependency Names: ${{ steps.metadata.outputs.dependency-names }}"
          echo "Update Type: ${{ steps.metadata.outputs.update-type }}"
          echo "Labels: ${{ github.event.pull_request.labels }}"
          echo "PR URL: ${{ github.event.pull_request.html_url }}"

      - name: Verify Dependabot actor
        run: |
          if [[ "${{ github.event.sender.type }}" != "Bot" || "${{ github.event.sender.login }}" != "dependabot[bot]" ]]; then
            echo "This PR is not from Dependabot. Exiting."
            exit 1
          fi

      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies and regenerate lock file
        run: npm install

      - name: Run tests
        run: npm run test

      - name: Commit lock file if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet package-lock.json; then
            echo "Lock file is already in sync, no changes needed."
            exit 0
          fi

          base64 -w0 package-lock.json | tr -d '\n' | gh api graphql \
            -f repo="$GITHUB_REPOSITORY" \
            -f branch="$BRANCH" \
            -f oid="$(git rev-parse HEAD)" \
            -F contents=@- \
            -f message="fix: regenerate lock file after dependency update" \
            -f query='
              mutation($repo: String!, $branch: String!, $oid: GitObjectID!, $contents: Base64String!, $message: String!) {
                createCommitOnBranch(input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: $message },
                  expectedHeadOid: $oid,
                  fileChanges: { additions: [{ path: "package-lock.json", contents: $contents }] }
                }) {
                  commit { oid }
                }
              }'

      - name: Enable auto-merge for Dependabot PRs
        if: contains(github.event.pull_request.labels.*.name, 'automerge')
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in $(seq 1 12); do
            mergeable="$(gh pr view "$PR_URL" --json mergeable --jq '.mergeable')"
            echo "Attempt $attempt: mergeable=$mergeable"
            if [ "$mergeable" != "UNKNOWN" ]; then
              break
            fi
            sleep 5
          done

          gh pr merge --squash "$PR_URL"
